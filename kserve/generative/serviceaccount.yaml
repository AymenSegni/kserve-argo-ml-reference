# ServiceAccount for generative model serving
# The HF token is injected via env.valueFrom.secretKeyRef in the ISVC manifests.
# If using a private container registry, add imagePullSecrets here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-generative-sa
  namespace: ml-generative
  labels:
    app.kubernetes.io/part-of: kserve-gitops-blueprint
# imagePullSecrets:
#   - name: registry-cred   # Uncomment if using a private container registry
