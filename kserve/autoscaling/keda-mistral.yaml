# KEDA ScaledObject for Mistral-7B (standalone example)
#
# NOTE: This is an ALTERNATIVE to using the inline autoScaling config
# in mistral-realtime-isvc.yaml. When `serving.kserve.io/autoscalerClass: "keda"`
# is set on the ISVC, KServe creates a ScaledObject automatically.
#
# Use this standalone ScaledObject only if you need KEDA features that
# KServe's inline integration doesn't expose (e.g., advanced triggers,
# custom cooldown, fallback behavior).
#
# ⚠️  Do NOT apply both this AND the inline autoScaling config — they will conflict.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: keda-mistral
  namespace: ml-generative
  labels:
    app.kubernetes.io/part-of: kserve-gitops-blueprint
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mistral-realtime-predictor-default
  minReplicaCount: 1
  maxReplicaCount: 3
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
        metricName: vllm_active_requests
        threshold: "3"
        query: sum(vllm:num_requests_running{namespace="ml-generative",pod=~"mistral-realtime-predictor-default.*"})
