# KEDA ScaledObject for the real-time Mistral endpoint
# Used if deploymentMode: "Standard" and KEDA is installed
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: keda-mistral
  namespace: ml-generative
spec:
  scaleTargetRef:
    # Use predictor deployment generated by KServe
    apiVersion: apps/v1
    kind: Deployment
    name: mistral-realtime-predictor-default
  minReplicaCount: 1
  maxReplicaCount: 3
  cooldownPeriod: 300
  pollingInterval: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: "http://kube-prometheus-stack-prometheus.monitoring.svc:9090"
        metricName: vllm_active_requests
        threshold: "3" # scale up when > 3 concurrent queries per replica
        query: sum(vllm:num_requests_running{namespace="ml-generative",pod=~"mistral-realtime-predictor-default.*"})
