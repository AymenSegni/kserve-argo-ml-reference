# InferenceGraph: Ensemble + Sequence multi-model pipeline
#
# Pipeline:
# 1. Ensemble: Send input to both ResNet50 and Sentence-BERT in parallel
# 2. Sequence: Feed combined output to Mistral for generation
#
# NOTE: Cross-namespace routing requires Istio mTLS policies to allow
# traffic between ml-graphs, ml-predictive, and ml-generative namespaces.
apiVersion: serving.kserve.io/v1alpha1
kind: InferenceGraph
metadata:
  name: ml-pipeline
  namespace: ml-graphs
spec:
  nodes:
    # Root node: Ensemble router (parallel execution)
    root:
      routerType: Ensemble
      steps:
        - name: image-features
          serviceName: resnet50
          serviceNamespace: ml-predictive
          serviceUrl: http://resnet50-predictor.ml-predictive.svc.cluster.local
        - name: text-features
          serviceName: sentence-bert
          serviceNamespace: ml-predictive
          serviceUrl: http://sentence-bert-predictor.ml-predictive.svc.cluster.local
        # Route ensemble output to the sequence node
        - nodeName: sequence-node

    # Sequence node: chain execution
    sequence-node:
      routerType: Sequence
      steps:
        - name: generator
          serviceName: mistral-batch
          serviceNamespace: ml-generative
          serviceUrl: http://mistral-batch-predictor.ml-generative.svc.cluster.local
